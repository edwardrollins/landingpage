<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Your Brand</title>
    <style>
      body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 40px; max-width: 720px; }
      h1 { margin: 0 0 12px; }
      p { margin: 0 0 24px; line-height: 1.5; }
      form { display: flex; gap: 10px; }
      input { flex: 1; padding: 12px; font-size: 16px; }
      button { padding: 12px 16px; font-size: 16px; cursor: pointer; }
      #msg { margin-top: 14px; }
    </style>
    <!-- Optional Turnstile (recommended). Create site key in Cloudflare dashboard first. -->
    <!-- <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script> -->
  </head>
  <body>
    <h1>Join the list</h1>
    <p>Drop your email to get updates.</p>

    <form id="form">
      <input id="email" type="email" placeholder="you@example.com" required />
      <button type="submit">Notify me</button>
    </form>

    <!-- Optional Turnstile widget -->
    <!-- <div class="cf-turnstile" data-sitekey="YOUR_TURNSTILE_SITE_KEY"></div> -->

    <div id="msg"></div>

    <script>
      const form = document.getElementById("form");
      const emailEl = document.getElementById("email");
      const msg = document.getElementById("msg");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        msg.textContent = "Submitting…";

        const body = new FormData();
        body.append("email", emailEl.value);

        // If you enable Turnstile, it injects cf-turnstile-response into the form submission
        // body.append("cf-turnstile-response", document.querySelector("[name='cf-turnstile-response']")?.value || "");

        const res = await fetch("/api/subscribe", { method: "POST", body });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          msg.textContent = "✅ You’re on the list.";
          emailEl.value = "";
        } else {
          msg.textContent = data?.error ? `❌ ${data.error}` : "❌ Something went wrong.";
        }
      });
    </script>
  </body>
</html>
